llm:
  temperature: 0.0
  max_tokens: 4096
  method0:
    # provider: "openai"
    # model: "gpt-5.4-mini"
    provider: "groq"
    model: "openai/gpt-oss-20b"
  method1:
    # provider: "openai"
    # model: "gpt-5.4-mini"
    provider: "groq"
    model: "openai/gpt-oss-20b"
  method2:
    # provider: "openai"
    # model: "gpt-5.4-mini"
    provider: "groq"
    model: "openai/gpt-oss-20b"
  method3:
    # provider: "openai"
    # model: "gpt-5.4-mini"
    provider: "groq"
    model: "openai/gpt-oss-20b"
  agent2:
    # Part 1: LLM for compressing chunks into summaries
    llm:
      provider: "openai"
      model: "gpt-5.4-mini"
      temperature: 0.3
      max_tokens: 250
    # Part 2: NLI model + graph algorithm config
    graph_logic:
      nli_model:
        provider: "huggingface"
        model_name: "cross-encoder/nli-deberta-v3-base"
        entailment_index: 1
      algorithm:
        threshold: 0.6
        allow_cycles: false
  agent3:
    provider: "openai"
    model: "gpt-5.4-mini"
  agent4:
    provider: "openai"
    model: "gpt-5.4-mini"

api_keys:
  openai_env: "OPENAI_API_KEY"
  groq_env: "GROQ_API_KEY"

retrieval:
  tavily:
    max_results: 10
    search_depth: "advanced"

  chunking:
    chunk_size: 500
    overlap: 60

  rerank:
    top_l: 8

pipeline_config:
  target_entity: "Surtsey"

# Methods config — used by methods 1, 2, and 3
methods:
  use_top_l: true
  top_l: 5
  # top_l: 8  # use when Eden's real data is ready
  reranker_type: "cross-encoder"      # "bm25", "cross-encoder", or "none"
  rerank_scope: "per-section"         # "global" (2.1) or "per-section" (2.2)