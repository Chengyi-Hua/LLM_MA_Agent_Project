llm:
  temperature: 0.0
  max_tokens: 4096
  method0:
    provider: "openrouter"
    #model: "openai/gpt-5.4-mini"        # change to any model on openrouter.ai/models
    model: "openrouter/free"
  method1:
    provider: "openrouter"
    model: "openrouter/free"
  method2:
    provider: "openrouter"
    model: "openrouter/free"
  method3:
    provider: "openrouter"
    model: "openrouter/free"
  agent2:
    # Part 1: LLM for compressing chunks into summaries
    llm:
      provider: "openrouter"
      model: "openrouter/free"
      temperature: 0.3
      max_tokens: 400
    # Part 2: NLI model + graph algorithm config
    graph_logic:
      nli_model:
        provider: "huggingface"
        model_name: "cross-encoder/nli-deberta-v3-base"
        entailment_index: 1
      algorithm:
        threshold: 0.6
        allow_cycles: false
  agent3:
    provider: "openrouter"
    model: "openrouter/free"
  agent4:
    provider: "openrouter"
    model: "openai/gpt-5.5"


api_keys:
  openai_env: "OPENAI_API_KEY"          
  groq_env: "GROQ_API_KEY"              
  openrouter_env: "OPENROUTER_API_KEY"  

retrieval:
  tavily:
    max_results: 10
    search_depth: "advanced"

  chunking:
    chunk_size: 500
    overlap: 60

  rerank:
    top_l: 8

pipeline_config:
  target_entity: "Surtsey"

# Methods config — used by methods 1, 2, and 3
methods:
  top_l: 5                          # number of chunks MMR selects per section
  reranker_type: "bm25+mmr"         # "bm25+mmr", "cross-encoder+mmr", or "none"
  rerank_scope: "per-section"       # "global" or "per-section"
  lambda_mult: 0.5                  # MMR balance: 0.0 = max diversity, 1.0 = max relevance